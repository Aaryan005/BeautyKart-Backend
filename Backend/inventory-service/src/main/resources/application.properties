spring.application.name=inventory-service
server.port=8083
spring.datasource.url=jdbc:mysql://localhost:3306/beautykart_inventory_db?createDatabaseIfNotExist=true

# Database credentials
spring.datasource.username=root
spring.datasource.password=root

# The MySQL Driver class (Optional in newer Spring Boot versions as it auto-detects)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Defines the SQL dialect so Hibernate generates optimized MySQL queries
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DDL auto-generation (create, create-drop, validate, update)
# Use 'update' for development, 'validate' or 'none' for production
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (Great for debugging)
spring.jpa.show-sql=true

# Format the logged SQL neatly instead of a single line
spring.jpa.properties.hibernate.format_sql=true

# Logs the actual values bound to the SQL parameters (?)
logging.level.org.hibernate.orm.jdbc.bind=trace

